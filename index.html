// Naya Smooth Navigation Logic (Purane ki tension mat lo, ye kaam karega)
function initTVNavigation() {
    document.removeEventListener('keydown', arguments.callee); // Purane logic ko block karne ke liye
    document.addEventListener('keydown', (e) => {
        const focusable = Array.from(document.querySelectorAll('[tabindex="0"], input, select, button, textarea'))
                              .filter(el => el.offsetParent !== null);
        
        const current = document.activeElement;
        const index = focusable.indexOf(current);

        if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
            e.preventDefault();
            
            if (index === -1) {
                if(focusable.length > 0) focusable[0].focus();
                return;
            }

            const currentRect = current.getBoundingClientRect();
            let bestElement = null;
            let minDistance = Infinity;

            focusable.forEach(el => {
                if (el === current) return;
                const rect = el.getBoundingClientRect();
                
                let isCorrectDirection = false;
                if (e.key === 'ArrowRight' && rect.left >= (currentRect.right - 10)) isCorrectDirection = true;
                if (e.key === 'ArrowLeft' && rect.right <= (currentRect.left + 10)) isCorrectDirection = true;
                if (e.key === 'ArrowDown' && rect.top >= (currentRect.bottom - 10)) isCorrectDirection = true;
                if (e.key === 'ArrowUp' && rect.bottom <= (currentRect.top + 10)) isCorrectDirection = true;

                if (isCorrectDirection) {
                    const distance = Math.sqrt(
                        Math.pow(rect.left - currentRect.left, 2) + 
                        Math.pow(rect.top - currentRect.top, 2)
                    );
                    if (distance < minDistance) {
                        minDistance = distance;
                        bestElement = el;
                    }
                }
            });

            if (bestElement) {
                bestElement.focus();
                bestElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        } 
        else if (e.key === 'Enter') {
            if (current && current.click) current.click();
        }
        else if (e.key === 'Escape' || e.key === 'Backspace') {
            if (document.getElementById('infoPanel').style.display === 'block') {
                closeAllPanels();
            }
        }
    });

    document.addEventListener('mousedown', (e) => {
        const target = e.target.closest('[tabindex="0"]');
        if (target) target.focus();
    });
}

            if(!q) { document.getElementById('searchHistoryBox').style.display = 'none'; return applyFilters(); }
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => { if (q.length > 2 && !searchHistory.includes(q)) { searchHistory.unshift(q); if (searchHistory.length > 8) searchHistory.pop(); localStorage.setItem('searchHistory', JSON.stringify(searchHistory)); } }, 2000);
            r = movies.filter(m => m.title.toLowerCase().includes(q) || m.genres.includes(q));
            displayGrid(r);
        }

        function setRating(r) { currentRating = r; stars = document.querySelectorAll('#starInput i'); stars.forEach((s, i) => { if (i < r) s.classList.add('active'); else s.classList.remove('active'); }); }
        function submitReview() {
            comment = document.getElementById('reviewComment').value.trim();
            uName = localStorage.getItem('uName') || "Anonymous"; uAvatar = localStorage.getItem('uAvatar') || "";
            if (currentRating === 0) return alert("Please select a star rating!");
            if (!comment) return alert("Please write a comment!");
            review = { user: uName, avatar: uAvatar, rating: currentRating, comment: comment, date: new Date().toLocaleDateString() };
            if (!userReviews[currentMovie.title]) userReviews[currentMovie.title] = [];
            userReviews[currentMovie.title].unshift(review);
            localStorage.setItem('userReviews', JSON.stringify(userReviews));
            document.getElementById('reviewComment').value = ""; setRating(0); renderReviews(); showToast("Review Posted Successfully!");
        }function renderReviews() {
            list =document.getElementById('reviewsList'); reviews = userReviews[currentMovie.title] || [];
            if (reviews.length === 0) { list.innerHTML = `<p class="text-zinc-600 text-sm italic">No reviews yet. Be the first to review!</p>`; return; }
            list.innerHTML = reviews.map(r => `
                <div class="review-card">
                    <div class="flex items-center gap-3 mb-3">
                        <img src="${r.avatar}" class="w-8 h-8 rounded border border-zinc-700">
                        <div>
                            <p class="text-xs font-black text-white">${r.user}</p>
                            <p class="text-[9px] text-zinc-500 font-bold uppercase">${r.date}</p>
                        </div>
                        <div class="ml-auto flex gap-1">
                            ${Array(5).fill(0).map((_, i) => `<i class="fa fa-star text-[10px] ${i < r.rating ? 'text-yellow-500' : 'text-zinc-700'}"></i>`).join('')}
                        </div>
                    </div>
                    <p class="text-sm text-zinc-300 leading-relaxed">${r.comment}</p>
                </div>
            `).join('');
        }

        function initTVNavigation() {
            document.addEventListener('keydown', (e) => {
                focusable = Array.from(document.querySelectorAll('[tabindex="0"], input, select, button, textarea')).filter(el => el.offsetParent !== null);
                index = focusable.indexOf(document.activeElement);
                if (e.key === 'ArrowRight') { e.preventDefault(); next = index + 1; if (next < focusable.length) focusable[next].focus(); } 
                else if (e.key === 'ArrowLeft') { e.preventDefault(); prev = index - 1; if (prev >= 0) focusable[prev].focus(); } 
                else if (e.key === 'ArrowDown') { e.preventDefault(); next = index + 6; if (next < focusable.length) focusable[next].focus(); else if (index < focusable.length - 1) focusable[index + 1].focus(); } 
                else if (e.key === 'ArrowUp') { e.preventDefault(); prev = index - 6; if (prev >= 0) focusable[prev].focus(); else if (index > 0) focusable[index - 1].focus(); } 
                else if (e.key === 'Enter') { if (document.activeElement && document.activeElement.click) document.activeElement.click(); }
                else if (e.key === 'Escape' || e.key === 'Backspace') { if (document.getElementById('infoPanel').style.display === 'block' || document.getElementById('genreOverlay').style.display === 'block') closeAllPanels(); }
            });
        }
    </script>
</body>
